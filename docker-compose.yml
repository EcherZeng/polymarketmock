# 主编排文件 — 启动全部服务
# 用法: docker compose up -d [--build]
# 单独重建: docker compose up -d --build <service>
#
# 子目录也可独立操作单个服务 (共享同一项目名/网络/卷):
#   cd Strategy && docker compose up -d --build

name: polymarketmock

services:
  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - polymarket
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Backend (Trading API) ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8071:8071"
    volumes:
      - backend_data:/app/data
    environment:
      PM_REDIS_URL: redis://redis:6379
      PM_GAMMA_API_URL: https://gamma-api.polymarket.com
      PM_CLOB_API_URL: https://clob.polymarket.com
      PM_DATA_API_URL: https://data-api.polymarket.com
      PM_DATA_DIR: /app/data
      PM_WS_URL: wss://ws-subscriptions-clob.polymarket.com/ws/market
      PM_LOG_LEVEL: INFO
    networks:
      - polymarket
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; print(httpx.get('http://localhost:8071/api/health').status_code)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Strategy Engine ──────────────────────────────────────────────────────────
  strategy:
    build:
      context: ./Strategy
      dockerfile: Dockerfile
    init: true
    ports:
      - "8072:8072"
    volumes:
      - backend_data:/app/data:ro
      - strategy_results:/app/results
      - strategy_user_presets:/app/user_config
    env_file:
      - ./Strategy/.env
    environment:
      STRATEGY_DATA_DIR: /app/data
      STRATEGY_STRATEGIES_DIR: /app/strategies
      STRATEGY_SERVER_PORT: "8072"
      STRATEGY_BACKEND_URL: http://backend:8071
    networks:
      - polymarket
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8072/health', timeout=5).raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── Frontend (Trading UI) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3021:3021"
    networks:
      - polymarket
    depends_on:
      - backend
    restart: unless-stopped

  # ── Strategy Frontend ──────────────────────────────────────────────────────
  strategyfrontend:
    build:
      context: ./Strategyfrontend
      dockerfile: Dockerfile
    ports:
      - "3022:3022"
    networks:
      - polymarket
    depends_on:
      - strategy
    restart: unless-stopped

networks:
  polymarket:
    name: polymarketmock_default

volumes:
  redis_data:
  backend_data:
  strategy_results:
  strategy_user_presets:
