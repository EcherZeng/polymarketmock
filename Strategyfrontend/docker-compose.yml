# 单独构建/更新 strategyfrontend 服务
# 用法: cd Strategyfrontend && docker compose up -d --build
# 注意: 需先通过根目录 docker compose up 启动主网络

services:
  strategyfrontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3022:3022"
    networks:
      - polymarket
    restart: unless-stopped

networks:
  polymarket:
    external: true
    name: polymarketmock_default
