# 单独构建/更新 strategyfrontend 服务
# 用法: cd Strategyfrontend && docker compose up -d --build
# 与根目录 docker-compose.yml 共享项目名，可直接替换容器

name: polymarketmock

services:
  strategyfrontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3022:3022"
    networks:
      - polymarket
    restart: unless-stopped

networks:
  polymarket:
    external: true
    name: polymarketmock_default
