# 单独构建/更新 backend 服务 (含 redis)
# 用法: cd backend && docker compose up -d --build backend
# 与根目录 docker-compose.yml 共享项目名，可直接替换容器

name: polymarketmock

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - polymarket
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8071:8071"
    volumes:
      - backend_data:/app/data
    environment:
      PM_REDIS_URL: redis://redis:6379
      PM_GAMMA_API_URL: https://gamma-api.polymarket.com
      PM_CLOB_API_URL: https://clob.polymarket.com
      PM_DATA_API_URL: https://data-api.polymarket.com
      PM_DATA_DIR: /app/data
      PM_WS_URL: wss://ws-subscriptions-clob.polymarket.com/ws/market
      PM_LOG_LEVEL: INFO
    networks:
      - polymarket
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; print(httpx.get('http://localhost:8071/api/health').status_code)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  polymarket:
    external: true
    name: polymarketmock_default

volumes:
  redis_data:
    external: true
  backend_data:
    external: true
