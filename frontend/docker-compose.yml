# 单独构建/更新 frontend 服务
# 用法: cd frontend && docker compose up -d --build
# 与根目录 docker-compose.yml 共享项目名，可直接替换容器

name: polymarketmock

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3021:3021"
    networks:
      - polymarket
    restart: unless-stopped

networks:
  polymarket:
    external: true
    name: polymarketmock_default
