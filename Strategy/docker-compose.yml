# 单独构建/更新 strategy 服务
# 用法: cd Strategy && docker compose up -d --build
# 与根目录 docker-compose.yml 共享项目名，可直接替换容器

name: polymarketmock

services:
  strategy:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8072:8072"
    volumes:
      - backend_data:/app/data:ro
      - strategy_results:/app/results
    env_file:
      - .env
    environment:
      STRATEGY_DATA_DIR: /app/data
      STRATEGY_STRATEGIES_DIR: /app/strategies
      STRATEGY_SERVER_PORT: "8072"
    networks:
      - polymarket
    restart: unless-stopped

networks:
  polymarket:
    external: true
    name: polymarketmock_default

volumes:
  backend_data:
    external: true
  strategy_results:
    external: true
