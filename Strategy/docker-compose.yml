# 单独构建/更新 strategy 服务
# 用法: cd Strategy && docker compose up -d --build
# 与根目录 docker-compose.yml 共享项目名，可直接替换容器

name: polymarketmock

services:
  strategy:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8072:8072"
    volumes:
      - backend_data:/app/data:ro
      - strategy_results:/app/results
      - strategy_user_presets:/app/user_config
    env_file:
      - .env
    environment:
      STRATEGY_DATA_DIR: /app/data
      STRATEGY_STRATEGIES_DIR: /app/strategies
      STRATEGY_SERVER_PORT: "8072"
      STRATEGY_BACKEND_URL: http://backend:8071
    networks:
      - polymarket
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8072/health', timeout=5).raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

networks:
  polymarket:
    external: true
    name: polymarketmock_default

volumes:
  backend_data:
    external: true
  strategy_results:
    external: true
  strategy_user_presets:
